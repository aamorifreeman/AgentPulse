# AgentPulse job configuration — copy to ~/.config/agentpulse/config.yaml
#
# Each job is run via `/bin/sh -c "<command>"`. Scheduled jobs use 5-field
# cron ("minute hour day-of-month month day-of-week"). All fields except
# name and command are optional.

jobs:
  - name: email-scan
    command: python3 ~/automations/email_scan.py
    schedule: "0 8 * * *"          # every day at 08:00
    missed_run_policy: run_on_wake # none | run_on_wake | run_now  (enforced in M5)
    timeout_seconds: 300           # kill the job (and its children) after 5 min
    retries: 2                     # additional attempts on failure (M5)

  - name: vault-processor
    command: ~/automations/process_vault.sh
    schedule: "*/30 * * * *"       # every 30 minutes

  - name: git-sync
    command: cd ~/notes && git pull --rebase && git push
    schedule: "15 */2 * * *"       # at :15 past every 2nd hour
    timeout_seconds: 120

# Jobs with no `schedule` never fire automatically; trigger them on demand:
#   apctl run <name>

# Alert rules evaluated against system metrics each sample tick.
# metric:    system.cpu.percent | system.memory.percent |
#            system.disk.available_gb | system.thermal_state
# condition: greater_than | less_than | at_least
# threshold: a number, or a thermal label (nominal/fair/serious/critical)
rules:
  - name: sustained-high-cpu
    metric: system.cpu.percent
    condition: greater_than
    threshold: 90
    duration_seconds: 300      # must hold 5 min before firing
    cooldown_seconds: 1800     # don't re-alert for 30 min
    severity: serious

  - name: thermal-pressure
    metric: system.thermal_state
    condition: at_least
    threshold: serious
    cooldown_seconds: 900
    severity: serious

  - name: low-disk-space
    metric: system.disk.available_gb
    condition: less_than
    threshold: 10
    severity: critical

  - name: high-memory
    metric: system.memory.percent
    condition: greater_than
    threshold: 90
    duration_seconds: 120

# Hold non-critical notifications during these local hours (critical still
# notifies). Wraps past midnight, e.g. start 23, end 7.
quiet_hours:
  start_hour: 23
  end_hour: 7

